services:
  auth-service:
    build:
      context: ./packages/guard-auth
      dockerfile: Dockerfile
    container_name: crm_auth
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - crm_network

  analytics-service:
    build:
      context: ./packages/analytics-service
    container_name: analytics-service
    restart: unless-stopped
    ports:
      - "9001:9001"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - crm_network

  shift-service:
    build:
      context: ./packages/shift-service
    container_name: shift-service
    restart: unless-stopped
    ports:
      - "9002:9002"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - crm_network

  assigner-service:
    build:
      context: ./packages/assigner
      dockerfile: Dockerfile
    container_name: crm_assigner
    restart: unless-stopped
    ports:
      - "9003:9003"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - crm_network

  gateway:
    build:
      context: ./shared
      dockerfile: Dockerfile
    container_name: crm_gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - auth-service
      - shift-service
      - analytics-service
      - assigner-service
    networks:
      - crm_network

  crm:
    build:
      context: ./packages/crm
      dockerfile: Dockerfile
    container_name: crm_frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - gateway
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  crm_network:
    driver: bridge
